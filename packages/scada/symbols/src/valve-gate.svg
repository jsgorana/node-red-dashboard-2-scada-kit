<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" role="img" aria-labelledby="valve-gate-title valve-gate-desc">
  <title id="valve-gate-title">SCADA gate valve symbol</title>
  <desc id="valve-gate-desc">Gate valve with bindable body, stem, gate position, status text, and alarm triangle.</desc>
  <g id="valve-gate" fill="none" stroke="var(--hmi-line-normal)" stroke-width="3" stroke-linejoin="round">
    <path id="valve-gate-pipe" d="M4 40h112" stroke="var(--hmi-line-active)" stroke-width="6" stroke-linecap="round"/>
    <path id="valve-gate-body-left" d="M24 18l36 22-36 22z" fill="var(--hmi-stopped)"/>
    <path id="valve-gate-body-right" d="M96 18L60 40l36 22z" fill="var(--hmi-stopped)"/>
    <path id="valve-gate-stem" d="M60 40V13" stroke="var(--hmi-running)" stroke-width="4" stroke-linecap="round"/>
    <path id="valve-gate-handwheel" d="M43 13h34M49 5l22 16M71 5L49 21" stroke="var(--hmi-line-active)" stroke-width="3" stroke-linecap="round"/>
    <path id="valve-gate-alarm-shape" d="M94 8h20l-10 18z" fill="var(--hmi-alarm-high)"/>
    <text stroke="none" id="valve-gate-alarm-text" x="104" y="23" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="var(--hmi-text-primary)">!</text>
    <text stroke="none" id="valve-gate-status-text" x="60" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="var(--hmi-text-label)">RUNNING</text>
  </g>
</svg>
